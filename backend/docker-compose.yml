version: '3.8'

services:
  hono:
    build: ./hono
    container_name: koconi_hono
    ports:
      - "3000:3000"
    env_file:
      - ./hono/.env
    depends_on:
      - koconi_db

  koconi_db:
    image: postgres:16-alpine
    container_name: koconi_db
    restart: always
    environment:
      - POSTGRES_USER=postgres_user
      - POSTGRES_PASSWORD=postgres_password
      - POSTGRES_DB=koconi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: koconi_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@koconi.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - koconi_db

  # 🧩 Next.js (Landing Page) 追加
  webpage:
    build: ../webpage               # Next.jsのDockerfileがあるディレクトリ
    container_name: koconi_webpage
    expose:
      - "3001"                      # 外部公開はNginx経由なのでExposeだけ
    environment:
      - NODE_ENV=production
      # Next.jsからHono APIを叩く場合は以下を追加
      # - NEXT_PUBLIC_API_BASE=https://koconi.com/api
    depends_on:
      - hono

  # 🌐 Nginx (Reverse Proxy)
  nginx:
    image: nginx:latest
    container_name: koconi_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - hono
      - webpage

volumes:
  postgres_data: