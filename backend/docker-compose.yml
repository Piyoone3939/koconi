version: '3.8'
services:
  hono:
    build: ./hono
    container_name: koconi_hono
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@koconi_db:5432/koconi
    depends_on:
      - koconi_db

  koconi_db:
    image: postgres:16-alpine
    container_name: koconi_db
    restart: always
    environment:
      - POSTGRES_USER=postgres_user
      - POSTGRES_PASSWORD=postgres_password
      - POSTGRES_DB=koconi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: koconi_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@koconi.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - koconi_db

volumes:
  postgres_data:
