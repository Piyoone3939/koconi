server {
  listen 80;
  server_name koconi.com www.koconi.com;

  # ① LP (静的ファイル)
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  # ② API (Golang)
  location /api/ {
    proxy_pass http://api:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Dotfiles (e.g. .env, .git) を拒否
  location ~ /\.(?!well-known).* {
    deny all;
    access_log off;
    log_not_found off;
  }

  # Git ディレクトリを明示的に拒否
  location ~ /\.git {
    deny all;
    access_log off;
    log_not_found off;
  }

  # 機密ファイル系を拒否
  location ~* \.(env|ini|log|bak|sql|yml|yaml)$ {
    deny all;
    access_log off;
    log_not_found off;
  }
}