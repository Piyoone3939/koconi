services:
  hono:
    build: ./backend/hono
    container_name: koconi_hono
    env_file:
      - ./services/api/.env
    depends_on:
      - koconi_db
    restart: unless-stopped

  webpage:
    build: ./apps/web
    container_name: koconi_webpage
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
    depends_on:
      - hono

  koconi_db:
    image: postgres:16-alpine
    container_name: koconi_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres_user
      - POSTGRES_PASSWORD=postgres_password
      - POSTGRES_DB=koconi
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    build: ./nginx
    container_name: koconi_nginx
    volumes:
      - ./apps/web/dist:/usr/share/nginx/html:ro
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - hono
      - webpage
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: koconi_cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  postgres_data: